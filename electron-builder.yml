appId: run.arcwork
productName: Arc Work
copyright: © Tim Hanlon

directories:
  output: dist
  # electron-builder auto-discovers build/icon.{icns,ico,png} here. build/ is
  # gitignored + regenerated by scripts/gen-icons.sh — the dist scripts run it first.
  buildResources: build

# electron-vite emits the app to out/; package that plus production deps.
files:
  - out/**
  - "!**/*.map"

# Native modules can't live inside the asar — keep them unpacked so dlopen works.
asarUnpack:
  - "**/*.node"
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/node-pty/**"

mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  hardenedRuntime: true
  entitlements: packaging/entitlements.mac.plist
  entitlementsInherit: packaging/entitlements.mac.plist
  # Notarization is off until an Apple Developer ID + creds are wired up.
  notarize: false

win:
  target:
    - nsis

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  # The PATH binary keeps the arc-work slug; the macOS .app stays "Arc Work".
  executableName: arc-work
  category: Development
  target:
    - AppImage
    - deb
